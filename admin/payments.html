<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments | MY FITNESS CMS</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- PayHere SDK -->
    <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>
</head>
<body class="dashboard-page">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h1 class="logo">MY FITNESS</h1><p class="subtitle">CMS Admin</p></div>
            <nav class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li class="nav-item"><a href="members.html" class="nav-link"><i class="fas fa-users"></i><span>Members</span></a></li>
                <li class="nav-item"><a href="payments.html" class="nav-link active"><i class="fas fa-credit-card"></i><span>Payments</span></a></li>
            </nav>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
        </aside>

        <main class="main-content">
            <header class="section-header">
                <h2>Payment Management</h2>
                <button id="addPaymentBtn" class="login-btn" style="margin-top: 0; width: auto; padding: 10px 20px;">
                    <i class="fas fa-plus"></i> Record Payment
                </button>
            </header>

            <div id="paymentFormSection" class="content-section" style="display: none; margin-bottom: 30px;">
                <h3>Record New Payment</h3>
                <form id="paymentForm" class="form-grid" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Member ID</label>
                        <input type="text" id="payMemberId" required placeholder="Select from list or enter ID">
                    </div>
                    <div class="form-group">
                        <label>Amount (LKR)</label>
                        <input type="number" id="payAmount" required placeholder="5000">
                    </div>
                    <div class="form-group">
                        <label>Method</label>
                        <select id="payMethod">
                            <option value="Cash">Cash</option>
                            <option value="PayHere">PayHere (Online)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Reference/Note</label>
                        <input type="text" id="payRef" placeholder="Receipt # or Transaction ID">
                    </div>
                    <div style="grid-column: span 2; display: flex; gap: 15px;">
                        <button type="submit" class="login-btn" style="flex: 1;">Confirm Payment</button>
                        <button type="button" onclick="document.getElementById('paymentFormSection').style.display='none'" class="logout-btn" style="flex: 1;">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="content-section">
                <h3>Payment History</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Member</th>
                            <th>Amount</th>
                            <th>Method</th>
                            <th>Ref</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTableBody">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/payments.js"></script>
</body>
</html>
