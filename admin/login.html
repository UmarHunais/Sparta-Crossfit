<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MY FITNESS CMS</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-glass">
            <div class="login-header">
                <h1 class="logo">MY FITNESS</h1>
                <p class="subtitle">Management System</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" required placeholder="admin@myfitness.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">Login to Dashboard</button>
                <div id="loginError" class="error-msg" style="display: none;"></div>
            </form>
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
